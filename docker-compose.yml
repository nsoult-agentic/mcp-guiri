services:
  mcp-guiri:
    image: ghcr.io/nsoult-agentic/mcp-guiri:sha-0343b1a
    container_name: mcp-guiri
    restart: unless-stopped

    # ── Network ──
    # On mcp_network so the NPM proxy (mcp-guiri.stabpablo.eu) resolves this container by
    # name, and so it can reach mcp-nextcloud by name (see NEXTCLOUD_MCP_URL below).
    # De-hosted from network_mode:host (#2510): Lucy moved to the proxy in shared-context PR #1,
    # so the former 0.0.0.0 LAN bind is no longer needed. The app still listens on 0.0.0.0:8918
    # *inside* the container; the publish below restricts host exposure to loopback.
    networks:
      - mcp_network
    ports:
      - "127.0.0.1:8918:8918"  # Loopback ONLY — NPM reaches the container by name on mcp_network

    # ── Security Hardening ──
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # ── Resource Limits ──
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

    # ── Filesystem ──
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    # ── Health Check ──
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8918/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Environment ──
    environment:
      - NODE_ENV=production
      - PORT=8918
      # Reach mcp-nextcloud by container name on mcp_network — was http://127.0.0.1:8902/mcp,
      # which only worked under network_mode:host (now removed). #2510.
      - NEXTCLOUD_MCP_URL=http://mcp-nextcloud:8902/mcp

networks:
  mcp_network:
    external: true
